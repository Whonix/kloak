name: Claude Code Review

on:
  pull_request:
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Claude Code Review
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        ## Comma-separated list of GitHub usernames allowed to trigger @claude.
        ## Remove or leave empty to allow everyone.
        allowed_users: "adrelanos,ArrayBolt3"
