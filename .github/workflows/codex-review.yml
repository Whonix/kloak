## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/codex-review.yml

name: OpenAI Codex Review

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_ref:
        description: |
          Ref of the fork PR to review.
          Use `refs/pull/<N>/merge` (most accurate; mirrors what
          would land), or `refs/pull/<N>/head` for the PR head.
          A plain branch name in the upstream repo also works for
          non-fork PRs.
        required: true
        type: string

permissions:
  contents: read

jobs:
  review:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-codex-review.yml@master
    with:
      pr-ref: ${{ inputs.pr_ref || '' }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    permissions:
      contents: read
      pull-requests: write
