## AI-Assisted

## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/coverity.yml

name: Coverity

on:
  push:
    tags:
      - '*'
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverity:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-coverity.yml@master
    with:
      apt-packages: "libevdev-dev libinput-dev libwayland-dev libxkbcommon-dev pkg-config"
      build-command: ./cov-analysis/bin/cov-build --dir cov-int make
      ## scan.coverity.com project name. Verified at
      ## https://scan.coverity.com/projects/Whonix-kloak
      project-name: Whonix/kloak
      canonical-repos: "Whonix/kloak,org-ai-assisted/kloak"
    secrets:
      COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
      COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
    permissions:
      contents: read
