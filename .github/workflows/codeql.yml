## AI-Assisted

## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/codeql.yml

name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '25 3 * * 5'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  c-cpp:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/codeql.yml@master
    with:
      language: c-cpp
      build-mode: manual
      build-command: bash build.sh
    permissions:
      security-events: write
      contents: read
      packages: read
