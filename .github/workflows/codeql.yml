## AI-Assisted

## CodeQL static analysis (consumer wrapper).
##
## Body of the job lives in the org-wide reusable workflow:
##   org-ai-assisted/developer-meta-files/.github/workflows/codeql.yml
##
## kloak is C-only at the source level (src/kloak.[ch]) so we run a
## single language matrix entry. If a Python tool is ever added under
## this repo, mirror the helper-scripts pattern and add a 'python:'
## job below.

name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    ## Cron slot owned by this repo - see slot allocation in the
    ## reusable workflow's header comment.
    - cron: '25 3 * * 5'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  c-cpp:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/codeql.yml@master
    with:
      language: c-cpp
      build-mode: manual
      build-command: bash build.sh
    permissions:
      security-events: write
      contents: read
      packages: read
