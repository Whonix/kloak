  ##         mode: 'code-change'
  ##         sanitizer: undefined
  ##         output-sarif: true

  batch-address:
    name: ClusterFuzzLite batch fuzz (address)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        ## https://github.com/actions/checkout/releases/tag/v6.0.2
        ## > de0fac2e4500dabe0009e67214ff5f5447ce83dd
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Build fuzzers
        ## https://github.com/google/clusterfuzzlite/tree/v1
        ## > 884713a6c30a92e5e8544c39945cd7cb630abcd1
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          language: c
          sanitizer: address

      - name: Run fuzzers (batch)
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: ${{ github.event.inputs.fuzz_seconds || '600' }}
          mode: 'batch'
          sanitizer: address
          output-sarif: true

  batch-undefined:
    name: ClusterFuzzLite batch fuzz (undefined)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          language: c
          sanitizer: undefined

      - name: Run fuzzers (batch)
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: ${{ github.event.inputs.fuzz_seconds || '600' }}
          mode: 'batch'
          sanitizer: undefined
          output-sarif: true
