## AI-Assisted

## Coverage-guided fuzzing for kloak's C parser surface, driven by
## ClusterFuzzLite. libFuzzer is the engine under the hood; the
## OSS-Fuzz base-builder image pre-bakes clang + sanitizer-aware
## $CC / $CFLAGS / $LIB_FUZZING_ENGINE for the harnesses in
## fuzz/fuzz_*.c.
##
## kloak's parsers (parse_uint31_arg, parse_uint32_arg,
## lookup_keycode) are intentionally exit()-free precisely so they
## can be fuzzed; see kloak.c:892 comment. parse_esc_key_str() is
## NOT yet harnessed because it calls exit(1) on bad input, which
## libFuzzer treats as a crash; harnessing it cleanly needs an
## upstream refactor.
##
## Two sanitizer jobs in parallel, mirrored by event-gated PR
## variants (currently commented out per the bootstrap pattern -
## see helper-scripts' local-python-fuzz.yml):
##   - batch-address:   AddressSanitizer (OOB, UAF, double-free).
##   - batch-undefined: UndefinedBehaviorSanitizer (signed overflow,
##                       null-deref, alignment, strict-aliasing).
##                       Relevant because kloak's Makefile already
##                       hardens via -ftrapv etc.; UBSan extends
##                       that coverage to the fuzz corpus.
##
## Reference: https://google.github.io/clusterfuzzlite/running-clusterfuzzlite/github-actions/

name: Fuzz

on:
  ## Manual-only until the ClusterFuzzLite build setup is verified
  ## green at least once. Once that lands, uncomment the
  ## pull_request and schedule blocks below.
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: 'Per-fuzzer time budget in seconds (batch job)'
        required: false
        default: '600'
  ## pull_request:
  ##   branches: [master]
  ##   paths:
  ##     - 'src/**'
  ##     - 'protocol/**'
  ##     - 'fuzz/**'
  ##     - '.clusterfuzzlite/**'
  ##     - 'ci/cfuzz-*.sh'
  ##     - '.github/workflows/local-cfuzz.yml'
  ## schedule:
  ##   - cron: '30 3 * * *'

## Default-deny at workflow level; jobs that need more redeclare.
## See agents/github-actions.md G-A-006.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ## ----- PR-trigger jobs (commented out until first green run) -----
