name: Scorecard

on:
  branch_protection_rule:
  schedule:
    ## Cron slot owned by this repo. Org allocation:
    ##   derivative-maker: '0 4 * * 0'
    ##   helper-scripts:   '30 4 * * 0'
    ##   kloak:            '0 5 * * 0'
    ##   security-misc:    '30 5 * * 0'
    - cron: '0 5 * * 0'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/scorecard.yml@master
    permissions:
      security-events: write
      contents: read
      actions: read
