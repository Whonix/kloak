version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ## Bundle all GitHub Actions SHA bumps into a single PR per
    ## weekly cycle. Without this, dependabot opens one PR per action
    ## per cycle and the 'open-pull-requests-limit: 1' silently drops
    ## the rest. With grouping, a single PR carries every action
    ## update at once, no drops.
    groups:
      github-actions:
        patterns:
          - "*"
